services:
  - type: web
    name: maichienglish-api
    runtime: docker
    region: singapore
    plan: free
    branch: main
    autoDeploy: false   # deploys are triggered by GitHub Actions after CI passes (see .github/workflows/backend.yml)
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false     # set manually in Render dashboard
      - key: JWT_SECRET_KEY
        sync: false     # generate: python -c "import secrets; print(secrets.token_urlsafe(48))"
      - key: DEBUG
        value: "false"
