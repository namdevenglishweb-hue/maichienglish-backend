[tool.pytest.ini_options]
testpaths = ["tests"]
# Put the project root on sys.path so tests can `import api`, `import services`,
# `import utils` without needing `python -m pytest` or installing the package.
# (Bare `pytest` doesn't add CWD; `python -m pytest` does — pythonpath unifies both.)
pythonpath = ["."]
asyncio_mode = "auto"
# Share one event loop across all async fixtures + tests so the
# session-scoped db_pool fixture (in conftest.py) can persist across
# function-scoped tests without "different loop" errors.
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]
markers = [
    # Tests touching a real Postgres. Auto-skipped unless MAICHI_TEST_DB=1
    # — see the collection hook in tests/conftest.py. CI sets the env in
    # the integration test job; local dev runs unit tests by default.
    "integration: requires a live Postgres (Sprint 2+); opt-in via MAICHI_TEST_DB=1",
]
filterwarnings = [
    "error",
    # bcrypt 4.x emits a DeprecationWarning about the deprecated __about__ module
    # — third-party noise, not actionable from our code.
    "ignore::DeprecationWarning:bcrypt",
    "ignore::DeprecationWarning:passlib",
    # pytest-asyncio 0.26.x calls both asyncio.get_event_loop_policy and
    # asyncio.set_event_loop_policy — both deprecated on Python 3.14 (removal
    # in 3.16). Locally on 3.11 they're silent; in CI on 3.14 they fire and
    # our `error` filter promotes them to failures. Belt-and-suspenders:
    # explicit messages + module-based catch-all in case pytest-asyncio
    # touches another deprecated asyncio surface we haven't seen yet.
    # The pytest-asyncio 1.x line fixes this properly — bump when convenient.
    "ignore:'asyncio.get_event_loop_policy' is deprecated:DeprecationWarning",
    "ignore:'asyncio.set_event_loop_policy' is deprecated:DeprecationWarning",
    "ignore::DeprecationWarning:pytest_asyncio",
    "ignore::DeprecationWarning:pytest_asyncio.plugin",
]

[tool.coverage.run]
source = ["api", "config", "dependencies", "services", "utils"]
omit = [
    "tests/*",
    ".venv/*",
    "migrations/*",
    "scripts/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
