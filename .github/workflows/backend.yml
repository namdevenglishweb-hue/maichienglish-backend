name: Backend CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  PYTHON_VERSION: '3.14'

jobs:
  smoke:
    name: Install + import smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app imports
        env:
          # Dummy DSN — settings only validates that DATABASE_URL is present at import time.
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
        run: python -c "import main; print('app:', main.app.title)"

  test:
    name: Pytest (no-DB unit + schema + mocked adapter)
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest --cov

  integration:
    name: Integration tests (Postgres 17)
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: maichi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MAICHI_TEST_DB: '1'
      # conftest.py reads MAICHI_TEST_DATABASE_URL (falls back to DATABASE_URL).
      MAICHI_TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/maichi_test
      # main.py reads DATABASE_URL via Settings; same DB so lifespan is happy.
      DATABASE_URL: postgresql://postgres:test@localhost:5432/maichi_test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration tests
        run: pytest -m integration --cov

  deploy-prod:
    name: Trigger Render deploy (prod)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Call Render Deploy API (prod)
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys"

  deploy-dev:
    name: Trigger Render deploy (dev / staging)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    steps:
      - name: Call Render Deploy API (dev)
        # Reuses RENDER_API_KEY (account-wide); separate service ID for the
        # staging environment connected to the dev branch.
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_DEV_SERVICE_ID }}/deploys"

  # Linting (ruff + mypy) is pending — separate job, runs in parallel with `test`.
